<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI-CV-COACH — Costruiamo il tuo profilo</title>
    <style>
      :root {
        --bordo: #e0e0e0;
        --ai-bg: #f1f3f5;
        --utente-bg: #d9eaff;
      }
      body {
        font-family: system-ui, sans-serif;
        max-width: 680px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
        color: #1a1a1a;
      }
      h1 { font-size: 1.2rem; }

      /* Area conversazione: i messaggi si impilano dall'alto verso il basso. */
      #chat {
        border: 1px solid var(--bordo);
        border-radius: 8px;
        padding: 1rem;
        min-height: 50vh;
        max-height: 60vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        background: #fff;
      }
      .bolla {
        max-width: 85%;
        padding: 0.55rem 0.8rem;
        border-radius: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .ai { align-self: flex-start; background: var(--ai-bg); border-bottom-left-radius: 3px; }
      .utente { align-self: flex-end; background: var(--utente-bg); border-bottom-right-radius: 3px; }
      .scheda {
        align-self: flex-start;
        max-width: 85%;
        background: #fff;
        border: 1px solid var(--bordo);
        border-left: 3px solid #4a90d9;
        border-radius: 8px;
        padding: 0.55rem 0.8rem;
      }
      .scheda h4 { margin: 0 0 0.3rem; font-size: 0.95rem; }
      .scheda ul { margin: 0.2rem 0; padding-left: 1.1rem; }
      .vuoto { color: #888; font-style: italic; }
      /* Documenti generati (anello 4): CV e lettera, resi dentro le schede. */
      .scheda .sommario { font-style: italic; margin: 0.2rem 0 0.4rem; }
      .scheda .blocco { white-space: pre-wrap; margin: 0.3rem 0; }
      .scheda .firma { font-weight: 600; margin-top: 0.4rem; }

      /* Area di interazione: ospita o la casella di testo o i bottoni. */
      #azione { margin-top: 0.9rem; }
      textarea {
        width: 100%;
        min-height: 4rem;
        font: inherit;
        padding: 0.5rem;
        box-sizing: border-box;
        border: 1px solid var(--bordo);
        border-radius: 6px;
      }
      button {
        padding: 0.5rem 1rem;
        font: inherit;
        cursor: pointer;
        border: 1px solid #b9b9b9;
        border-radius: 6px;
        background: #fafafa;
      }
      button:hover { background: #f0f0f0; }
      button.primario { background: #4a90d9; color: #fff; border-color: #3a7bc0; }
      button.primario:hover { background: #3a7bc0; }
      .bottoni { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .fila-invia { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
      .fila-invia button { white-space: nowrap; }
      .errore { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Costruiamo insieme il tuo profilo</h1>

    <div id="chat" aria-live="polite"></div>
    <div id="azione"></div>

    <script>
      // ====================================================================
      // AI-CV-COACH — orchestrazione del dialogo (front-end).
      //
      // Il server è senza stato: a ogni turno gli mandiamo { turno, risposta }
      // e ci restituisce un frammento JSON. La MEMORIA del profilo e il FLUSSO
      // del dialogo vivono qui, nel browser.
      //
      // Tre tipi di turno:
      //  - singolo    (nome): una risposta, un campo.
      //  - ripetibile (esperienze, formazione): lista di voci, con loop
      //                "altro o procediamo?".
      //  - blocco     (competenze): lista di stringhe, con un giro di aggiunta.
      // ====================================================================

      const BASE = "http://localhost:3000";
      const ENDPOINT = BASE + "/struttura";

      // --- Stato: il profilo, unica fonte di verità (ricalca lo schema). ---
      const profilo = {
        nome: "",
        contatti: { email: "", telefono: "", citta: "", link: "" },
        patente: { ha: "", categorie: [] },
        esperienze_formali: [],
        esperienze_informali: [],
        competenze: [],
        formazione: [],
      };

      // --- Anti-perdita: magazzino dei frammenti instradati ad altri turni ---
      // Quando l'utente, in un turno, accenna a qualcosa di competenza di un
      // altro turno, l'estrazione lo restituisce in "altrove" (parole esatte
      // dell'utente). Lo accantoniamo qui per categoria di destinazione e lo
      // riproponiamo — strutturato e da confermare — quando si apre quel turno
      // (instradamento in avanti) o, se il turno è già passato, nella passata
      // finale prima del riepilogo (instradamento all'indietro).
      const pending = {
        esperienze_formali: [],
        esperienze_informali: [],
        competenze: [],
        formazione: [],
      };

      // Etichetta leggibile di una categoria del profilo (per i messaggi).
      const ETICHETTE_CATEGORIA = {
        esperienze_formali: "esperienze di lavoro",
        esperienze_informali: "esperienze informali",
        competenze: "competenze",
        formazione: "studi e formazione",
      };
      const etichettaCategoria = (dest) => ETICHETTE_CATEGORIA[dest] || dest;

      // Travasa i frammenti di fr.altrove nel magazzino pending, per categoria.
      // `escludi` evita di re-instradare verso la categoria che stiamo già
      // smaltendo (no loop sullo stesso secchio).
      function raccogliAltrove(fr, escludi) {
        const a = fr && fr.altrove;
        if (!a || typeof a !== "object") return;
        for (const dest of Object.keys(pending)) {
          if (dest === escludi) continue;
          const lista = a[dest];
          if (!Array.isArray(lista)) continue;
          for (const t of lista) {
            if (typeof t === "string" && t.trim()) pending[dest].push(t.trim());
          }
        }
      }

      // Come sopra ma SENZA ri-parcheggiare: ritorna solo l'elenco dei frammenti
      // instradati altrove. Lo usa l'iniezione per non innescare il ping-pong:
      // un frammento già parcheggiato viene tentato una volta sola nel suo turno;
      // ciò che non si struttura lì non rimbalza, lo si dichiara "lasciato fuori".
      function altroveLeftover(fr, escludi) {
        const a = fr && fr.altrove;
        const out = [];
        if (!a || typeof a !== "object") return out;
        for (const dest of Object.keys(pending)) {
          if (dest === escludi) continue;
          const lista = a[dest];
          if (!Array.isArray(lista)) continue;
          for (const t of lista) {
            if (typeof t === "string" && t.trim()) out.push(t.trim());
          }
        }
        return out;
      }

      // --- Stato della fase di generazione (anelli 2-4), riempito dopo il
      //     profilo: l'annuncio strutturato, i giudizi del confronto e il CV
      //     mirato (riferimento di coerenza per la lettera). ---
      let annuncio = null;
      let giudizi = [];
      let cvMirato = null;

      // --- Riferimenti UI ---
      const chat = document.getElementById("chat");
      const azione = document.getElementById("azione");

      // --- Helper conversazione --------------------------------------------

      // Aggiunge un elemento alla chat e scorre in fondo.
      function appendiInChat(el) {
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
        return el;
      }

      // Bolla di testo (assistente o utente).
      function aggiungiBolla(testo, classe) {
        const div = document.createElement("div");
        div.className = "bolla " + classe;
        div.textContent = testo;
        return appendiInChat(div);
      }
      const aiDice = (testo) => aggiungiBolla(testo, "ai");
      const utenteDice = (testo) => aggiungiBolla(testo, "utente");

      // Scheda con campi etichettati (per le voci-oggetto: esperienze, formazione).
      // righe = [{ etichetta, valore }]. Valore vuoto → "(non specificata)".
      function schedaCampi(titolo, righe) {
        const div = document.createElement("div");
        div.className = "scheda";
        if (titolo) {
          const h = document.createElement("h4");
          h.textContent = titolo;
          div.appendChild(h);
        }
        const ul = document.createElement("ul");
        for (const r of righe) {
          const li = document.createElement("li");
          if (r.valore) {
            li.textContent = r.etichetta + ": " + r.valore;
          } else {
            li.textContent = r.etichetta + ": ";
            const span = document.createElement("span");
            span.className = "vuoto";
            span.textContent = "(non specificata)";
            li.appendChild(span);
          }
          ul.appendChild(li);
        }
        div.appendChild(ul);
        return appendiInChat(div);
      }

      // Scheda a lista nuda (per le competenze e per parti del riepilogo).
      function schedaLista(titolo, elementi) {
        const div = document.createElement("div");
        div.className = "scheda";
        if (titolo) {
          const h = document.createElement("h4");
          h.textContent = titolo;
          div.appendChild(h);
        }
        const ul = document.createElement("ul");
        for (const e of elementi) {
          const li = document.createElement("li");
          li.textContent = e;
          ul.appendChild(li);
        }
        div.appendChild(ul);
        return appendiInChat(div);
      }

      // Svuota l'area di interazione (prima di mostrare testo o bottoni).
      function pulisciAzione() {
        azione.innerHTML = "";
      }

      // Mostra una casella di testo + Invia; chiama onInvia(testo) al clic.
      function chiediTesto(placeholder, onInvia) {
        pulisciAzione();
        const ta = document.createElement("textarea");
        ta.placeholder = placeholder || "Scrivi qui la tua risposta…";

        const btn = document.createElement("button");
        btn.className = "primario";
        btn.textContent = "Invia";

        const fila = document.createElement("div");
        fila.className = "fila-invia";
        fila.appendChild(btn);

        azione.appendChild(ta);
        azione.appendChild(fila);
        ta.focus();

        const invia = () => {
          const testo = ta.value.trim();
          if (!testo) return;
          pulisciAzione();
          onInvia(testo);
        };
        btn.addEventListener("click", invia);
        // Invio con Ctrl/Cmd+Enter, per comodità.
        ta.addEventListener("keydown", (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") invia();
        });
      }

      // Mostra una fila di bottoni. `scelte` = [{ etichetta, primario?, onClick }].
      function chiediScelta(scelte) {
        pulisciAzione();
        const cont = document.createElement("div");
        cont.className = "bottoni";
        for (const s of scelte) {
          const btn = document.createElement("button");
          btn.textContent = s.etichetta;
          if (s.primario) btn.className = "primario";
          btn.addEventListener("click", () => {
            pulisciAzione();
            s.onClick();
          });
          cont.appendChild(btn);
        }
        azione.appendChild(cont);
      }

      // --- Ponte verso il server -------------------------------------------

      // Toglie eventuali fence markdown ```json ... ``` attorno al JSON e
      // restituisce l'oggetto. Il modello a volte avvolge la risposta.
      function estraiFrammento(testoGrezzo) {
        let t = testoGrezzo.trim();
        if (t.startsWith("```")) {
          t = t.replace(/^```[a-zA-Z]*\s*/, "").replace(/\s*```$/, "").trim();
        }
        return JSON.parse(t);
      }

      // Manda { turno, risposta } al server e restituisce il frammento (oggetto).
      async function strutturaTurno(turno, risposta) {
        const res = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ turno, risposta }),
        });
        const testo = await res.text();
        if (!res.ok) throw new Error("Risposta server non valida: " + testo);
        return estraiFrammento(testo);
      }

      // Mostra "sto leggendo…", chiama il server, e restituisce il frammento
      // (o null in caso di errore, già segnalato in chat).
      async function chiamaConAttesa(chiave, risposta) {
        const inAttesa = aiDice("Un attimo, sto leggendo…");
        try {
          const fr = await strutturaTurno(chiave, risposta);
          inAttesa.remove();
          return fr;
        } catch (err) {
          inAttesa.textContent =
            "Ho avuto un problema a contattare il server (è avviato su localhost:3000?). Riprova.";
          inAttesa.classList.add("errore");
          return null;
        }
      }

      // POST generico verso un endpoint del server (anelli 2-4); ritorna
      // l'oggetto JSON (il server lo restituisce già pulito, estraiFrammento
      // resta come difesa in più).
      async function postServer(path, payload) {
        const res = await fetch(BASE + path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const testo = await res.text();
        if (!res.ok) throw new Error(testo);
        return estraiFrammento(testo);
      }

      // Come chiamaConAttesa ma per un endpoint qualsiasi; mostra un messaggio
      // di attesa e ritorna l'oggetto (o null se c'è stato un errore).
      async function postConAttesa(path, payload, msg) {
        const inAttesa = aiDice(msg || "Un attimo…");
        try {
          const obj = await postServer(path, payload);
          inAttesa.remove();
          return obj;
        } catch (err) {
          inAttesa.textContent =
            "Ho avuto un problema a contattare il server (è avviato su localhost:3000?). Riprova.";
          inAttesa.classList.add("errore");
          return null;
        }
      }

      // --- Definizione dei turni (ordine e comportamento) ------------------

      const TURNI = [
        {
          chiave: "nome",
          tipo: "singolo",
          apertura:
            "Ciao!\n" +
            "Ti chiederò sia le esperienze formali (lavori, studi, corsi), sia quelle informali " +
            "(cose fatte per amici, famiglia, passioni): contano entrambe.\n" +
            "Useremo le tue risposte — solo quelle — per preparare un CV su misura.\n\n" +
            "Per iniziare: come ti chiami?",
          mostraScheda(fr) {
            if (fr.nome) aiDice("Ho capito che ti chiami: " + fr.nome + ".");
            else aiDice("Non ho colto un nome nella tua risposta.");
          },
          unisci(fr) {
            profilo.nome = fr.nome || "";
          },
        },
        {
          chiave: "contatti",
          tipo: "singolo",
          apertura:
            "Bene! Ora qualche dato pratico, che useremo così com'è per l'intestazione del CV.\n" +
            "Scrivimeli pure anche tutti insieme: email, telefono, città, e un eventuale link (LinkedIn o un tuo sito).\n\n" +
            "E un'ultima cosa, importante: hai la patente di guida? Se sì, di che categoria (es. B)?",
          mostraScheda(fr) {
            const c = fr.contatti || {};
            const p = fr.patente || {};
            const righe = [];
            if (c.email) righe.push("Email: " + c.email);
            if (c.telefono) righe.push("Telefono: " + c.telefono);
            if (c.citta) righe.push("Città: " + c.citta);
            if (c.link) righe.push("Link: " + c.link);
            const pat =
              p.ha === "sì"
                ? "sì" +
                  (Array.isArray(p.categorie) && p.categorie.length
                    ? " (" + p.categorie.join(", ") + ")"
                    : "")
                : p.ha === "no"
                ? "no"
                : "non indicata";
            righe.push("Patente: " + pat);
            aiDice("Ecco cosa ho capito:\n" + righe.join("\n"));
          },
          unisci(fr) {
            const c = fr.contatti || {};
            profilo.contatti = {
              email: c.email || "",
              telefono: c.telefono || "",
              citta: c.citta || "",
              link: c.link || "",
            };
            const p = fr.patente || {};
            profilo.patente = {
              ha: p.ha || "",
              categorie: Array.isArray(p.categorie) ? p.categorie : [],
            };
            raccogliAltrove(fr, "contatti");
          },
        },
        {
          chiave: "esperienze_formali",
          tipo: "ripetibile",
          apertura:
            "Partiamo dalle esperienze di lavoro vere e proprie: raccontamele con parole tue, come vengono. " +
            "Gli studi e i corsi li vediamo dopo.\n" +
            "Procediamo un lavoro alla volta.\n\n" +
            "* Qual è il primo che ti viene in mente?",
          riapertura: "Raccontami la prossima.",
          ponte: "Hai un'altra esperienza di lavoro da raccontarmi, o procediamo?",
          testoVuoto: "Non ho colto un'esperienza di lavoro in quello che hai scritto.",
          campi: [
            { chiave: "ruolo", etichetta: "Ruolo" },
            { chiave: "azienda", etichetta: "Azienda" },
            { chiave: "durata", etichetta: "Durata" },
            { chiave: "cosa_facevo", etichetta: "Cosa facevo" },
          ],
        },
        {
          chiave: "esperienze_informali",
          tipo: "ripetibile",
          apertura:
            "Raccontami ora le esperienze informali: cose fatte senza che fossero un lavoro vero e proprio — " +
            "aiutare un familiare con la sua attività, dare una mano in associazioni o eventi, " +
            "una passione che ti ha insegnato qualcosa. Non c'è bisogno che sia \"importante\".\n\n" +
            "* Ti viene in mente qualcosa del genere?",
          riapertura: "Raccontami la prossima.",
          ponte: "Hai un'altra esperienza informale, o procediamo?",
          testoVuoto: "Non ho colto un'esperienza informale in quello che hai scritto.",
          campi: [
            { chiave: "cosa_facevo", etichetta: "Cosa facevo" },
            { chiave: "quando", etichetta: "Quando" },
            { chiave: "con_chi", etichetta: "Con chi" },
          ],
        },
        {
          chiave: "competenze",
          tipo: "blocco",
          apertura:
            "Passiamo alle competenze, cioè le cose che sai fare.\n" +
            "Pensa a quello che mi hai raccontato finora — i lavori, le esperienze. " +
            "Da tutto questo, cosa ti senti di saper fare? Anche cose pratiche e concrete.\n\n" +
            "* Cosa ti riesce bene?",
          testoVuoto: "Non ho colto competenze in quello che hai scritto.",
        },
        {
          chiave: "formazione",
          tipo: "ripetibile",
          apertura:
            "Siamo all'ultimo campo: gli studi e i corsi. Diplomi, qualifiche, corsi di formazione — " +
            "tutto quello che hai studiato o imparato in modo strutturato.\n" +
            "Procediamo come prima, uno alla volta.\n\n" +
            "* Qual è il primo che ti viene in mente?",
          riapertura: "Raccontami la prossima.",
          ponte: "Hai un'altra esperienza di studio o formazione, o abbiamo finito?",
          testoVuoto: "Non ho colto un titolo di studio o un corso in quello che hai scritto.",
          campi: [
            { chiave: "titolo", etichetta: "Titolo" },
            { chiave: "istituto", etichetta: "Istituto" },
            { chiave: "anno", etichetta: "Anno" },
          ],
        },
      ];

      const trovaTurno = (chiave) => TURNI.find((t) => t.chiave === chiave);

      // --- Macchina del dialogo --------------------------------------------

      let indiceTurno = 0;

      function avviaProssimoTurno() {
        if (indiceTurno >= TURNI.length) return chiudiDialogo();
        const turno = TURNI[indiceTurno];
        aiDice(turno.apertura);
        switch (turno.tipo) {
          case "singolo":
            return gestisciSingolo(turno);
          case "ripetibile":
            return gestisciRipetibile(turno);
          case "blocco":
            return gestisciBlocco(turno);
        }
      }

      function passaAlProssimo() {
        indiceTurno++;
        avviaProssimoTurno();
      }

      // Turno "singolo": una risposta → scheda → conferma → avanti.
      function gestisciSingolo(turno) {
        chiediTesto("La tua risposta…", async (risposta) => {
          utenteDice(risposta);
          const fr = await chiamaConAttesa(turno.chiave, risposta);
          if (!fr) return gestisciSingolo(turno);
          turno.mostraScheda(fr);
          chiediScelta([
            {
              etichetta: "Sì, è giusto",
              primario: true,
              onClick: () => {
                turno.unisci(fr);
                passaAlProssimo();
              },
            },
            {
              etichetta: "Correggi",
              onClick: () => {
                aiDice("Va bene, riscrivimela come viene.");
                gestisciSingolo(turno);
              },
            },
          ]);
        });
      }

      // Righe di una voce-oggetto per la scheda: i campi del turno, più una riga
      // "Tipo" solo se valorizzata (tirocinio/stage), in testa per darle risalto.
      function righeVoce(turno, voce) {
        const righe = [];
        const tipo = (voce.tipo || "").trim();
        if (tipo) righe.push({ etichetta: "Tipo", valore: tipo });
        for (const c of turno.campi) {
          righe.push({ etichetta: c.etichetta, valore: (voce[c.chiave] || "").trim() });
        }
        return righe;
      }

      // Mostra la scheda di conferma in blocco per una lista di voci-oggetto.
      function mostraVoci(turno, voci) {
        aiDice("Ecco cosa ho capito:");
        for (const voce of voci) schedaCampi(null, righeVoce(turno, voce));
      }

      // Anteprima delle voci ricavate da un frammento parcheggiato: lista nuda
      // per le competenze (stringhe), schede a campi per le altre categorie.
      function anteprimaVoci(dest, voci) {
        if (dest === "competenze") {
          schedaLista(null, voci);
        } else {
          const turno = trovaTurno(dest);
          for (const voce of voci) schedaCampi(null, righeVoce(turno, voce));
        }
      }

      // Turno "ripetibile": lista di voci, conferma in blocco, poi loop
      // "altro o procediamo?". All'ingresso smaltisce prima i frammenti
      // parcheggiati per questo turno (instradamento in avanti).
      function gestisciRipetibile(turno) {
        if (pending[turno.chiave].length) {
          return smaltisciPending(turno.chiave, () => chiediRipetibile(turno));
        }
        chiediRipetibile(turno);
      }

      function chiediRipetibile(turno) {
        chiediTesto("La tua risposta…", async (risposta) => {
          utenteDice(risposta);
          const fr = await chiamaConAttesa(turno.chiave, risposta);
          if (!fr) return chiediRipetibile(turno);

          const voci = fr[turno.chiave] || [];
          if (voci.length === 0) {
            aiDice(turno.testoVuoto);
            chiediScelta([
              {
                etichetta: "Riprovo",
                primario: true,
                onClick: () => {
                  aiDice("Va bene, raccontamela come viene.");
                  chiediRipetibile(turno);
                },
              },
              {
                etichetta: "Passiamo oltre",
                onClick: () => {
                  raccogliAltrove(fr);
                  passaAlProssimo();
                },
              },
            ]);
            return;
          }

          mostraVoci(turno, voci);
          chiediScelta([
            {
              etichetta: "Sì, è giusto",
              primario: true,
              onClick: () => {
                profilo[turno.chiave].push(...voci);
                raccogliAltrove(fr);
                chiediAltro(turno);
              },
            },
            {
              etichetta: "Correggi",
              onClick: () => {
                aiDice("Va bene, raccontamela di nuovo.");
                chiediRipetibile(turno);
              },
            },
          ]);
        });
      }

      // Reminder-ponte dei turni ripetibili: un'altra voce o avanti.
      function chiediAltro(turno) {
        aiDice("Perfetto, segnata.\n\n" + turno.ponte);
        chiediScelta([
          {
            etichetta: "Ne ho un'altra",
            primario: true,
            onClick: () => {
              aiDice(turno.riapertura);
              chiediRipetibile(turno);
            },
          },
          { etichetta: "Procediamo", onClick: passaAlProssimo },
        ]);
      }

      // Turno "blocco" (competenze): raccolta in blocco + un solo giro di aggiunta.
      // All'ingresso smaltisce prima i frammenti parcheggiati per questo turno.
      function gestisciBlocco(turno) {
        if (pending[turno.chiave].length) {
          return smaltisciPending(turno.chiave, () => chiediBlocco(turno));
        }
        chiediBlocco(turno);
      }

      function chiediBlocco(turno) {
        chiediTesto("La tua risposta…", async (risposta) => {
          utenteDice(risposta);
          const fr = await chiamaConAttesa(turno.chiave, risposta);
          if (!fr) return chiediBlocco(turno);

          const voci = fr[turno.chiave] || [];
          if (voci.length === 0 && profilo[turno.chiave].length === 0) {
            aiDice(turno.testoVuoto);
            chiediScelta([
              {
                etichetta: "Riprovo",
                primario: true,
                onClick: () => {
                  aiDice("Va bene, cosa ti riesce bene?");
                  chiediBlocco(turno);
                },
              },
              {
                etichetta: "Passiamo oltre",
                onClick: () => {
                  raccogliAltrove(fr);
                  passaAlProssimo();
                },
              },
            ]);
            return;
          }

          profilo[turno.chiave].push(...voci);
          raccogliAltrove(fr);
          mostraCompetenze();
          chiediScelta([
            {
              etichetta: "Ne aggiungo altre",
              onClick: () => {
                aiDice("Dimmi pure cosa aggiungere.");
                aggiungiCompetenzeUnGiro(turno);
              },
            },
            { etichetta: "Vanno bene", primario: true, onClick: passaAlProssimo },
          ]);
        });
      }

      // Un solo giro di aggiunta competenze, poi si chiude (niente secondo giro).
      function aggiungiCompetenzeUnGiro(turno) {
        chiediTesto("Cosa vuoi aggiungere…", async (risposta) => {
          utenteDice(risposta);
          const fr = await chiamaConAttesa(turno.chiave, risposta);
          if (!fr) return aggiungiCompetenzeUnGiro(turno);
          profilo[turno.chiave].push(...(fr[turno.chiave] || []));
          raccogliAltrove(fr);
          mostraCompetenze();
          chiediScelta([
            { etichetta: "Confermiamo", primario: true, onClick: passaAlProssimo },
          ]);
        });
      }

      function mostraCompetenze() {
        aiDice("Ecco cosa ho capito — le cose che sai fare:");
        schedaLista(null, profilo.competenze);
      }

      // --- Anti-perdita: l'iniezione di un frammento parcheggiato ----------

      // Smaltisce i frammenti parcheggiati per la categoria `dest`: li struttura
      // col prompt di quel turno, li mostra e fa scegliere all'utente
      // (aggiungi / correggi / scarta). Nulla entra nel profilo senza la sua
      // conferma. In ogni ramo, alla fine, chiama prosegui().
      //
      // Regola di TERMINAZIONE: un frammento entrato qui è consumato UNA volta
      // sola — non torna mai nel magazzino `pending` da dentro questa funzione.
      // Ciò che il turno di destinazione non sa strutturare non rimbalza (niente
      // ping-pong fra categorie): lo dichiariamo "lasciato fuori" (perdita resa
      // visibile, mai silenziosa). Così la passata finale converge sempre.
      async function smaltisciPending(dest, prosegui) {
        const frammenti = pending[dest].splice(0);
        if (!frammenti.length) return prosegui();

        aiDice(
          "Prima avevi accennato a qualcosa che riguarda «" +
            etichettaCategoria(dest) +
            "», e l'avevo tenuto da parte. Vediamolo ora:"
        );
        utenteDice(frammenti.join(" / "));

        const fr = await chiamaConAttesa(dest, frammenti.join("\n"));
        if (!fr) {
          aiDice(
            "Non sono riuscita a leggerlo (problema col server), quindi lo lascio fuori: «" +
              frammenti.join(" / ") + "»."
          );
          return prosegui();
        }

        const voci = fr[dest] || [];
        const fuori = altroveLeftover(fr, dest); // NON ri-parcheggiati

        if (!voci.length) {
          aiDice(
            "Questo non sono riuscita a collocarlo in nessuna sezione, quindi lo lascio fuori: «" +
              (fuori.length ? fuori.join(" / ") : frammenti.join(" / ")) + "»."
          );
          return prosegui();
        }

        anteprimaVoci(dest, voci);
        chiediScelta([
          {
            etichetta: "Sì, aggiungilo",
            primario: true,
            onClick: () => {
              profilo[dest].push(...voci);
              aiDice("Fatto, l'ho aggiunto.");
              if (fuori.length) {
                aiDice(
                  "Una parte non l'ho saputa collocare, la lascio fuori: «" +
                    fuori.join(" / ") + "»."
                );
              }
              prosegui();
            },
          },
          {
            etichetta: "Correggi",
            onClick: () => {
              aiDice("Va bene, riscrivimelo come va detto.");
              chiediTesto("La tua correzione…", async (risposta) => {
                utenteDice(risposta);
                const fr2 = await chiamaConAttesa(dest, risposta);
                if (!fr2) return prosegui();
                const voci2 = fr2[dest] || [];
                if (voci2.length) {
                  profilo[dest].push(...voci2);
                  anteprimaVoci(dest, voci2);
                  aiDice("Aggiornato e aggiunto.");
                } else {
                  aiDice("Non ho colto una voce da aggiungere. Proseguiamo.");
                }
                prosegui();
              });
            },
          },
          {
            etichetta: "Scartalo",
            onClick: () => {
              aiDice("Va bene, lo lascio perdere.");
              prosegui();
            },
          },
        ]);
      }

      // --- Chiusura: passata finale + riepilogo leggibile del profilo ------

      // Prima del riepilogo recupera, uno alla volta, gli eventuali frammenti
      // ancora parcheggiati la cui destinazione è un turno già passato
      // (instradamento all'indietro). Ricorsiva finché il magazzino è vuoto.
      function chiudiDialogo() {
        passataFinale(mostraRiepilogo);
      }

      function passataFinale(dopo) {
        const dest = Object.keys(pending).find((k) => pending[k].length);
        if (!dest) return dopo();
        aiDice(
          "Prima di chiudere, recuperiamo una cosa che avevi accennato e non avevamo ancora registrato."
        );
        smaltisciPending(dest, () => passataFinale(dopo));
      }

      function mostraRiepilogo() {
        aiDice(
          "Perfetto, abbiamo finito di costruire il tuo profilo.\n" +
            "Ecco un riepilogo di quello che ho raccolto:"
        );

        schedaLista("Nome", [profilo.nome || "(non indicato)"]);
        riepilogoSezione("Esperienze formali", "esperienze_formali");
        riepilogoSezione("Esperienze informali", "esperienze_informali");
        schedaLista(
          "Competenze",
          profilo.competenze.length ? profilo.competenze : ["(nessuna indicata)"]
        );
        riepilogoSezione("Formazione", "formazione");

        aiDice(
          "Userò soltanto queste informazioni — niente di inventato — per aiutarti a " +
            "preparare CV e lettera su misura."
        );

        // Comodo in fase di sviluppo: il profilo completo in console.
        console.log("Profilo raccolto:", profilo);

        // Si passa alla fase di generazione (anelli 2-3-4).
        avviaFaseGenerazione();
      }

      // Riepiloga una sezione a voci-oggetto (una scheda per voce).
      function riepilogoSezione(titolo, chiave) {
        const voci = profilo[chiave];
        if (!voci.length) {
          schedaLista(titolo, ["(nessuna indicata)"]);
          return;
        }
        const turno = trovaTurno(chiave);
        voci.forEach((voce, i) => {
          schedaCampi(titolo + " " + (i + 1), righeVoce(turno, voce));
        });
      }

      // --- Fase di generazione (anelli 2-3-4) ------------------------------
      // Dopo il profilo: o il CV base (solo profilo), o il percorso mirato a
      // un annuncio (analisi annuncio → confronto → CV mirato → lettera).

      function avviaFaseGenerazione() {
        aiDice(
          "Ora possiamo preparare un CV. Puoi partire dal CV base (dal solo " +
            "profilo) oppure mirare a un annuncio: in quel caso confronto il " +
            "tuo profilo con l'annuncio e preparo un CV mirato e una lettera."
        );
        offriScelteGenerazione();
      }

      // Le due strade dopo il profilo. Dopo aver fatto il CV base, resta
      // disponibile solo la strada dell'annuncio.
      function offriScelteGenerazione({ baseGiaFatto = false } = {}) {
        const scelte = [];
        if (!baseGiaFatto) {
          scelte.push({ etichetta: "📄 CV base ora", primario: true, onClick: generaCvBase });
        }
        scelte.push({
          etichetta: "🎯 Miro a un annuncio",
          primario: baseGiaFatto,
          onClick: chiediAnnuncio,
        });
        chiediScelta(scelte);
      }

      // 📄 CV base — dal solo profilo (anello 4, cv_base).
      async function generaCvBase() {
        const cv = await postConAttesa("/genera-cv", { profilo }, "Preparo il CV base…");
        if (!cv) return offriScelteGenerazione();
        aiDice("Ecco il tuo CV base:");
        mostraCv(cv);
        aiDice("Vuoi anche mirare a un annuncio specifico?");
        offriScelteGenerazione({ baseGiaFatto: true });
      }

      // 🎯 Anello 2 — incolla l'annuncio e strutturalo.
      function chiediAnnuncio() {
        aiDice("Incolla qui il testo dell'annuncio di lavoro che ti interessa.");
        chiediTesto("Incolla l'annuncio…", async (testo) => {
          utenteDice(testo);
          const ann = await postConAttesa(
            "/struttura",
            { turno: "analisi_annuncio", risposta: testo },
            "Sto leggendo l'annuncio…"
          );
          if (!ann) return chiediAnnuncio();
          annuncio = ann;
          const ruolo = ann.titolo ? ' per la posizione di "' + ann.titolo + '"' : "";
          aiDice("Ho letto l'annuncio" + ruolo + ". Confronto il tuo profilo con i requisiti.");
          eseguiConfronto();
        });
      }

      // Anello 3 — confronto profilo↔annuncio e match.
      async function eseguiConfronto() {
        const conf = await postConAttesa(
          "/confronta",
          { profilo, annuncio },
          "Confronto profilo e annuncio…"
        );
        if (!conf) {
          chiediScelta([{ etichetta: "Riprova confronto", primario: true, onClick: eseguiConfronto }]);
          return;
        }
        giudizi = conf.giudizi || [];
        mostraMatch(conf);
        aiDice("Da qui preparo il CV mirato e la lettera, su misura per questo annuncio.");
        chiediScelta([{ etichetta: "🎯 Genera CV mirato", primario: true, onClick: generaCvMirato }]);
      }

      // Anello 4 — CV mirato (cv_mirato), poi offre la lettera.
      async function generaCvMirato() {
        const cv = await postConAttesa(
          "/genera-cv",
          { profilo, annuncio, giudizi },
          "Preparo il CV mirato…"
        );
        if (!cv) {
          chiediScelta([{ etichetta: "Riprova CV mirato", primario: true, onClick: generaCvMirato }]);
          return;
        }
        cvMirato = cv;
        aiDice("Ecco il tuo CV mirato su questo annuncio:");
        mostraCv(cv);
        aiDice("Vuoi anche la lettera di presentazione, coerente con questo CV?");
        chiediScelta([
          { etichetta: "✉️ Genera lettera", primario: true, onClick: generaLettera },
          {
            etichetta: "No, va bene così",
            onClick: () => aiDice("Perfetto. Se vuoi puoi rigenerare quando preferisci."),
          },
        ]);
      }

      // Anello 4 — lettera di presentazione (lettera_mirata).
      async function generaLettera() {
        // Prima la mitigazione (2.2.4): dai gap del confronto, i ponti onesti per la
        // lettera. Se fallisce non blocchiamo: la lettera tace sui gap (mitigazioni []).
        const mit = await postConAttesa(
          "/mitiga",
          { profilo, giudizi },
          "Cerco argomenti per colmare i punti deboli…"
        );
        const mitigazioni = (mit && mit.mitigazioni) || [];
        const lettera = await postConAttesa(
          "/genera-lettera",
          { profilo, annuncio, giudizi, cv: cvMirato, mitigazioni },
          "Scrivo la lettera…"
        );
        if (!lettera) {
          chiediScelta([{ etichetta: "Riprova lettera", primario: true, onClick: generaLettera }]);
          return;
        }
        aiDice("Ecco la tua lettera di presentazione:");
        mostraLettera(lettera);
        aiDice("Abbiamo completato il CV mirato e la lettera per questo annuncio.");
      }

      // --- Rendering dei documenti generati --------------------------------

      // Mostra un CV (base o mirato) come una serie di schede, nello stile del
      // riepilogo del profilo. I campi vuoti si omettono.
      function mostraCv(cv) {
        const testa = document.createElement("div");
        testa.className = "scheda";
        const h = document.createElement("h4");
        h.textContent = (cv.intestazione && cv.intestazione.nome) || "CV";
        testa.appendChild(h);
        if (cv.sommario) {
          const s = document.createElement("div");
          s.className = "sommario";
          s.textContent = cv.sommario;
          testa.appendChild(s);
        }
        appendiInChat(testa);

        const righe = (coppie) =>
          coppie.filter((c) => (c.valore || "").trim()).map((c) => ({ etichetta: c.etichetta, valore: c.valore }));

        if ((cv.esperienze_professionali || []).length) {
          aiDice("Esperienze professionali");
          for (const e of cv.esperienze_professionali) {
            schedaCampi(null, righe([
              { etichetta: "Ruolo", valore: e.ruolo },
              { etichetta: "Azienda", valore: e.azienda },
              { etichetta: "Durata", valore: e.durata },
              { etichetta: "Descrizione", valore: e.descrizione },
            ]));
          }
        }
        if ((cv.altre_esperienze || []).length) {
          aiDice("Altre esperienze");
          for (const e of cv.altre_esperienze) {
            schedaCampi(null, righe([
              { etichetta: "Descrizione", valore: e.descrizione },
              { etichetta: "Quando", valore: e.quando },
            ]));
          }
        }
        if ((cv.competenze || []).length) {
          schedaLista("Competenze", cv.competenze);
        }
        if ((cv.formazione || []).length) {
          aiDice("Formazione");
          for (const f of cv.formazione) {
            schedaCampi(null, righe([
              { etichetta: "Titolo", valore: f.titolo },
              { etichetta: "Istituto", valore: f.istituto },
              { etichetta: "Anno", valore: f.anno },
            ]));
          }
        }
      }

      // Mostra il match dell'anello 3: stelle + giudizio per ogni requisito.
      function mostraMatch(conf) {
        const stelle = conf.stelle != null ? conf.stelle : "?";
        aiDice("Ho confrontato profilo e annuncio. Match: " + stelle + " su 5 stelle.");
        // Il sentinel "Nessuna esperienza richiesta" non è un requisito da
        // soddisfare: è già escluso dal punteggio e per l'utente è solo rumore,
        // quindi non lo mostriamo (vale anche se il modello lo allucina su una
        // lista esperienza_richiesta vuota).
        const righe = (conf.giudizi || [])
          .filter((g) => (g.requisito || "").trim().toLowerCase() !== "nessuna esperienza richiesta")
          .map((g) => {
            const peso = g.priorita || g.importanza || "";
            return "[" + (g.esito || "") + "] " + (peso ? "(" + peso + ") " : "") + g.requisito;
          });
        schedaLista("Requisiti dell'annuncio", righe.length ? righe : ["(nessun requisito)"]);
      }

      // Mostra la lettera come blocchi di testo dentro una scheda.
      function mostraLettera(lettera) {
        const div = document.createElement("div");
        div.className = "scheda";
        for (const blocco of ["apertura", "corpo", "chiusura"]) {
          if (lettera[blocco]) {
            const p = document.createElement("div");
            p.className = "blocco";
            p.textContent = lettera[blocco];
            div.appendChild(p);
          }
        }
        if (lettera.firma) {
          const f = document.createElement("div");
          f.className = "firma";
          f.textContent = lettera.firma;
          div.appendChild(f);
        }
        appendiInChat(div);
      }

      // --- Avvio -----------------------------------------------------------
      avviaProssimoTurno();
    </script>
  </body>
</html>
